<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔍 AI Medical Chatbot</title>
    <style>
        :root {
            --primary-color: #0284c7;
            --primary-hover: #0369a1;
            --bg-color: #f8fafc;
            --chat-bg: #ffffff;
            --user-msg: #e0f2fe;
            --bot-msg: #f1f5f9;
            --text-main: #1e293b;
            --error-color: #ef4444;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 2rem 1rem;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .chat-container { 
            max-width: 750px; 
            margin: 0 auto; 
            background-color: var(--chat-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        h1 {
            font-size: 1.75rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            text-align: center;
            color: var(--primary-color);
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 1rem;
        }

        .error { 
            background-color: #fee2e2;
            color: var(--error-color); 
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            border-left: 4px solid var(--error-color);
        }

        #chat-box {
            height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Кастомизация скроллбара для чата */
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        .message { 
            padding: 0.85rem 1.25rem; 
            border-radius: 12px; 
            max-width: 85%;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .user { 
            background-color: var(--user-msg); 
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .assistant { 
            background-color: var(--bot-msg); 
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .msg-role {
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
            opacity: 0.7;
        }

        form { 
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        textarea { 
            width: 100%; 
            height: 4rem; 
            padding: 0.75rem; 
            font-size: 1rem; 
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            resize: none;
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.15);
        }

        .actions-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
        }

        button { 
            padding: 0.65rem 1.5rem; 
            font-size: 0.95rem; 
            font-weight: 600;
            cursor: pointer; 
            border-radius: 8px;
            border: none;
            transition: background-color 0.2s, transform 0.1s;
        }

        button[type="submit"] {
            background-color: var(--primary-color);
            color: white;
        }

        button[type="submit"]:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .clear-btn { 
            background-color: transparent;
            color: #64748b;
            border: 1px solid #cbd5e1;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        .clear-btn:hover {
            background-color: #f1f5f9;
            color: #334155;
            border-color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <h1>🔍 AI Medical Chatbot New Change</h1>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <div id="chat-box">
            {% for msg in messages %}
                <div class="message {{ msg.role }}">
                    <div class="msg-role">{{ msg.role|capitalize }}</div>
                    {{ msg.content | safe | nl2br }}
                </div>
            {% endfor %}
        </div>

        <form method="post" action="{{ url_for('index') }}">
            <textarea name="prompt" placeholder="Ask a medical question..." required></textarea>
            
            <div class="actions-row">
                <!-- Кнопка очистки перенесена в строку управления для компактности -->
                <button type="button" class="clear-btn" onclick="window.location.href='{{ url_for('clear') }}'">Clear Chat</button>
                <button type="submit">Send Message</button>
            </div>
        </form>
    </div>

    <script>
        // Автоматическая прокрутка чата вниз при загрузке страницы
        const chatBox = document.getElementById('chat-box');
        if (chatBox) {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
